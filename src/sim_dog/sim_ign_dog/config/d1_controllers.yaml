controller_manager:
  ros__parameters:
    update_rate: 1000
    switch_timeout: 30.0
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    legs_controller:
      type: joint_trajectory_controller/JointTrajectoryController

legs_controller:
  ros__parameters:
    joints: [FL_ABAD_JOINT, FL_HIP_JOINT, FL_KNEE_JOINT, FR_ABAD_JOINT, FR_HIP_JOINT, FR_KNEE_JOINT, RL_ABAD_JOINT, RL_HIP_JOINT, RL_KNEE_JOINT, RR_ABAD_JOINT, RR_HIP_JOINT, RR_KNEE_JOINT]
    command_interfaces: [position] #命令接口
    state_interfaces: [position, velocity] #状态接口
    state_publish_rate: 50.0 #状态发布频率
    action_monitor_rate: 20.0 #动作监视器频率
    allow_partial_joints_goal: false #是否允许部分关节目标
    constraints:
      goal_time: 1.0 #目标时间
      stopped_velocity_tolerance: 0.01 #停止时的速度容差
    gains:
      FL_ABAD_JOINT        : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      FL_HIP_JOINT         : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      FL_KNEE_JOINT        : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      FR_ABAD_JOINT        : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      FR_HIP_JOINT         : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      FR_KNEE_JOINT        : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RL_ABAD_JOINT        : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RL_HIP_JOINT         : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RL_KNEE_JOINT        : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RR_ABAD_JOINT        : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RR_HIP_JOINT         : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
      RR_KNEE_JOINT        : {p: 100.0, i: 0.2, d: 1.0, i_clamp: 2.5, ff_velocity_scale: 1.0}
    use_sim_time: True
