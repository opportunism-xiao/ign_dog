# Example configuration:
# - velocity limits are around a 10% above the physical limits
# - acceleration limits are just low enough to avoid jerking

# Mandatory parameters
speed_lim_v_x: 2 #速度限制 m/s
speed_lim_v_y: 0.35 #速度限制 m/s

speed_lim_w: 0.4 #角速度限制 rad/s

accel_lim_v: 1.0 #线加速度限制 m/s²
accel_lim_w: 2.0 #角加速度限制 rad/s²

# Optional parameters
frequency: 10.0
decel_factor: 1.0

# Robot velocity feedback type:
#  0 - none
#  1 - odometry
#  2 - end robot commands
robot_feedback: 2