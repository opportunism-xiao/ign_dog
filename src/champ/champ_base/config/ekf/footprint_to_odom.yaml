footprint_to_odom_ekf:
  ros__parameters:
    frequency: 20.0
    publish_tf: true
    transform_timeout: 0.00
    # transform_time_offset: 0.05
    two_d_mode: true
    # diagnostics_agg: true

    #x     , y     , z,
    #roll  , pitch , yaw,
    #vx    , vy    , vz,
    #vroll , vpitch, vyaw,
    #ax    , ay    , az

    odom0: odom/ign
    odom0_config: [true,  true,  false,
                  false, false, true,
                  true,  true,  false,
                  false, false, true,
                  false, false, false]
    
    imu0: imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, false,
                  true, true, false]

    odom_frame: d1_dog/odom
    base_link_frame: d1_dog/base_footprint
    world_frame: d1_dog/odom


    
